replicaCount: 3

image:
  repository: registry.momentum.app/momentum-app
  tag: "stable"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  host: api.momentum.app
  tls: true

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

env:
  SPRING_PROFILES_ACTIVE: prod,keycloak
