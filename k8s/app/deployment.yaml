apiVersion: apps/v1
kind: Deployment
metadata:
  name: momentum-app
  namespace: momentum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: momentum-app
  template:
    metadata:
      labels:
        app: momentum-app
    spec:
      containers:
        - name: momentum
          image: momentum-app:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: momentum-config
            - secretRef:
                name: momentum-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
