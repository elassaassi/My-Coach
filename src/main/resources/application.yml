spring:
  application:
    name: momentum

  # ── Threads ──────────────────────────────────────────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── Datasource ───────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/momentum
    username: momentum
    password: momentum
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  # ── JPA ──────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ── Multipart uploads ────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  # OAuth2 providers are registered programmatically in OAuth2ClientConfig
  # to allow the app to start even when credentials are not set.

# ── App config ────────────────────────────────────────────────────────────────
momentum:
  jwt:
    secret: ${JWT_SECRET:momentum-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000   # 24h
  oauth2:
    redirect-uri: ${FRONTEND_URL:http://localhost:4200}/auth/callback
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/uploads}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  default-produces-media-type: application/json

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    org.elas.momentum: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
